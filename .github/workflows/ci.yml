name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Sync dev environment
        run: just sync

      - name: Lint
        run: just lint

      - name: Format check
        run: just fmt-check

      - name: Type check
        run: just typecheck

      - name: Tests
        run: just test

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - uses: taiki-e/install-action@v2
        with:
          tool: just

      # CPU-only: covers the protocol/handler tests. The model load + ML decode
      # path is GPU/weights-gated (lazy torch import in inference.py), so it is
      # intentionally not counted.
      - name: Coverage (XML artifact)
        run: just coverage-xml

      - uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml

  # Publish the browsable HTML coverage report to GitHub Pages (main only).
  # One-time setup: repo Settings → Pages → Source = "GitHub Actions".
  # Served at https://<owner>.github.io/super-stt-qwen-asr/.
  coverage-pages:
    name: Coverage (Pages)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pages: write
      id-token: write
    # Serialize deploys; never cancel an in-flight Pages deployment.
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - uses: taiki-e/install-action@v2
        with:
          tool: just

      # Renders the static report to htmlcov/ and writes coverage.json totals
      # (same CPU-only scope as the XML job).
      - name: Generate HTML coverage report
        run: just coverage

      # Drop a shields.io "endpoint" JSON beside the HTML so the README badge
      # reads the latest line-% straight from Pages — no Gist or PAT. pytest-cov
      # already emitted coverage.json (totals.percent_covered).
      - name: Write coverage badge JSON
        run: |
          set -euo pipefail
          pct=$(python3 -c 'import json;print(json.load(open("coverage.json"))["totals"]["percent_covered"])')
          if   awk "BEGIN{exit !($pct>=90)}"; then color=brightgreen
          elif awk "BEGIN{exit !($pct>=75)}"; then color=green
          elif awk "BEGIN{exit !($pct>=60)}"; then color=yellow
          elif awk "BEGIN{exit !($pct>=40)}"; then color=orange
          else color=red
          fi
          printf '{"schemaVersion":1,"label":"coverage","message":"%.1f%%","color":"%s"}\n' \
            "$pct" "$color" > htmlcov/coverage.json
          cat htmlcov/coverage.json

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: htmlcov

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
