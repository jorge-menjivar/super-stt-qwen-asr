# SPDX-License-Identifier: GPL-3.0-only
#:schema https://jorge-menjivar.github.io/super-stt/backend.schema.json
# Qwen3-ASR (local, GPU) subprocess backend. See docs/protocol/backend/.

[backend]
    source = "github.com/jorge-menjivar/super-stt-qwen-asr"
    name = "Qwen3-ASR"
    version = "0.1.0"
    kind = "subprocess"
    entrypoint = "bin/qwen3-asr"
    contract = "v1"
    license = "GPL-3.0-only"
    description = "Local Qwen3-ASR speech-to-text."

[network]
    allowed_hosts = []

[[assets.subprocess]]
    file = "qwen3-asr-x86_64-unknown-linux-gnu-cpu.tar.gz"
    target = "x86_64-unknown-linux-gnu"
    accel = "cpu"

# One CUDA build serves every GPU family: the bundled PyTorch wheel is
# multi-architecture, so cuda_sm is omitted (wildcard). The bundle exceeds
# GitHub's 2 GiB release-asset limit, so it ships as ordered parts whose
# in-order concatenation is the .tar.gz (release.yml splits it; the daemon
# downloads, verifies, and reassembles them).
[[assets.subprocess]]
    parts = [
        "qwen3-asr-x86_64-unknown-linux-gnu-cuda13.tar.gz.part00",
        "qwen3-asr-x86_64-unknown-linux-gnu-cuda13.tar.gz.part01",
    ]
    target = "x86_64-unknown-linux-gnu"
    accel = "cuda"
    cuda_major = 13

[[models]]
    name = "qwen3-asr-0.6b"
    provider = "local_qwen3_asr"
    multilingual = true
    primary_language = "en"
    supported_languages = [
        "zh",
        "en",
        "yue",
        "ar",
        "de",
        "fr",
        "es",
        "pt",
        "id",
        "it",
        "ko",
        "ru",
        "th",
        "vi",
        "ja",
        "tr",
        "hi",
        "ms",
        "nl",
        "sv",
        "da",
        "fi",
        "pl",
        "cs",
        "fil",
        "fa",
        "el",
        "hu",
        "mk",
        "ro",
    ]
    supported_devices = ["cpu", "cuda"]
    estimated_vram_bytes = 2500000000
    processing_interval_ms = 1000

    files = [
        { url = "https://huggingface.co/Qwen/Qwen3-ASR-0.6B/resolve/main/config.json", destination = "models/qwen3-asr-0.6b/config.json" },
        { url = "https://huggingface.co/Qwen/Qwen3-ASR-0.6B/resolve/main/generation_config.json", destination = "models/qwen3-asr-0.6b/generation_config.json" },
        { url = "https://huggingface.co/Qwen/Qwen3-ASR-0.6B/resolve/main/preprocessor_config.json", destination = "models/qwen3-asr-0.6b/preprocessor_config.json" },
        { url = "https://huggingface.co/Qwen/Qwen3-ASR-0.6B/resolve/main/chat_template.json", destination = "models/qwen3-asr-0.6b/chat_template.json" },
        { url = "https://huggingface.co/Qwen/Qwen3-ASR-0.6B/resolve/main/tokenizer_config.json", destination = "models/qwen3-asr-0.6b/tokenizer_config.json" },
        { url = "https://huggingface.co/Qwen/Qwen3-ASR-0.6B/resolve/main/vocab.json", destination = "models/qwen3-asr-0.6b/vocab.json" },
        { url = "https://huggingface.co/Qwen/Qwen3-ASR-0.6B/resolve/main/merges.txt", destination = "models/qwen3-asr-0.6b/merges.txt" },
        { url = "https://huggingface.co/Qwen/Qwen3-ASR-0.6B/resolve/main/model.safetensors", destination = "models/qwen3-asr-0.6b/model.safetensors" },
    ]

